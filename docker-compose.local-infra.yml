# Infra local: Postgres + Redis (use com o .env na raiz do backend).
# Subir: docker compose -f docker-compose.local-infra.yml up -d
# Parar: docker compose -f docker-compose.local-infra.yml down

services:
  postgres:
    image: postgres:15-alpine
    environment:
      TZ: America/Sao_Paulo
      PGTZ: America/Sao_Paulo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "Sa@43690"
      POSTGRES_DB: database
    ports:
      - "5432:5432"
    volumes:
      - crm_loop_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d database"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    environment:
      TZ: America/Sao_Paulo
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]

volumes:
  crm_loop_pgdata:
